{{define "content"}}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-foreground">Rules</h1>
        <button onclick="showCreateRuleModal()"
            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-primary-foreground bg-primary hover:bg-primary/90">
            <svg class="-ml-1 mr-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
            New Rule
        </button>
    </div>

    <div class="bg-card rounded-lg shadow-sm border border-border p-4 relative">
        <form id="rules-filter-form"
            hx-get="{{.Prefix}}/htmx/rules-list" hx-target="#rules-list" hx-swap="innerHTML"
            hx-trigger="submit, change delay:100ms, input delay:100ms"
            hx-sync="this:replace"
            class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label for="container" class="block text-sm font-medium text-foreground mb-1">Source</label>
                <select id="container" name="container"
                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-border focus:outline-none focus:ring-ring focus:border-ring rounded-md bg-background">
                    <option value="">All</option>
                    {{range .Containers}}<option value="{{.}}">{{.}}</option>{{end}}
                </select>
            </div>
            <div>
                <label for="destination" class="block text-sm font-medium text-foreground mb-1">Destination</label>
                <input type="text" id="destination" name="destination" placeholder="e.g., openai.com"
                    class="mt-1 block w-full px-3 py-2 border border-border rounded-md shadow-sm focus:outline-none focus:ring-ring focus:border-ring bg-background">
            </div>
            <div class="flex items-center pt-6">
                <input type="checkbox" id="include_expired" name="include_expired" value="true"
                    class="h-4 w-4 text-primary focus:ring-ring border-border rounded">
                <label for="include_expired" class="ml-2 block text-sm text-foreground">Show expired</label>
            </div>
            <div class="flex items-end">
                <button type="button" id="clear-filters-btn" onclick="clearRulesFilters()"
                    class="hidden w-full inline-flex justify-center items-center px-4 py-2 border border-border text-sm font-medium rounded-md text-secondary-foreground bg-background hover:bg-muted">Clear</button>
            </div>
        </form>
    </div>

    <div id="rules-list"
         hx-get="{{.Prefix}}/htmx/rules-list" hx-include="#rules-filter-form"
         hx-trigger="load" hx-swap="innerHTML">
        <div class="flex justify-center py-8">
            <div class="inline-block w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>
</div>

<!-- Create/Edit Rule Modal -->
<div id="rule-modal" class="hidden fixed z-10 inset-0 overflow-y-auto">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="hideRuleModal()"></div>
        <div class="inline-block align-bottom bg-card rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <form id="rule-form" hx-post="{{.Prefix}}/htmx/rules" hx-target="#rules-list" hx-swap="innerHTML">
                <div class="bg-card px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                        <h3 class="text-lg leading-6 font-medium text-foreground" id="modal-title">Create New Rule</h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label for="container_pattern" class="block text-sm font-medium text-foreground">Source Pattern</label>
                                <input type="text" name="container_pattern" id="container_pattern" required placeholder="e.g., dataindex-*, *"
                                    class="mt-1 block w-full px-3 py-2 border border-border rounded-md shadow-sm focus:outline-none focus:ring-ring focus:border-ring bg-background">
                                <p class="mt-1 text-xs text-muted-foreground">Use * for wildcards</p>
                            </div>
                            <div>
                                <label for="destination_pattern" class="block text-sm font-medium text-foreground">Destination Pattern</label>
                                <input type="text" name="destination_pattern" id="destination_pattern" required placeholder="e.g., api.openai.com, *.openai.com"
                                    class="mt-1 block w-full px-3 py-2 border border-border rounded-md shadow-sm focus:outline-none focus:ring-ring focus:border-ring bg-background">
                            </div>
                            <div>
                                <label for="port_pattern" class="block text-sm font-medium text-foreground">Port Pattern</label>
                                <input type="text" name="port_pattern" id="port_pattern" value="*" placeholder="e.g., 443, 80,443, *"
                                    class="mt-1 block w-full px-3 py-2 border border-border rounded-md shadow-sm focus:outline-none focus:ring-ring focus:border-ring bg-background">
                            </div>
                            <div>
                                <label for="action" class="block text-sm font-medium text-foreground">Action</label>
                                <select name="action" id="action"
                                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-border focus:outline-none focus:ring-ring focus:border-ring rounded-md bg-background">
                                    <option value="allow">Allow</option>
                                    <option value="deny">Deny</option>
                                </select>
                            </div>
                            <div>
                                <label for="rule_type" class="block text-sm font-medium text-foreground">Duration</label>
                                <select name="rule_type" id="rule_type"
                                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-border focus:outline-none focus:ring-ring focus:border-ring rounded-md bg-background">
                                    <option value="permanent">Permanent</option>
                                    <option value="temporary">Temporary (24h)</option>
                                </select>
                            </div>
                            <div>
                                <label for="notes" class="block text-sm font-medium text-foreground">Notes (optional)</label>
                                <textarea name="notes" id="notes" rows="3" placeholder="Add a description or reason"
                                    class="mt-1 block w-full px-3 py-2 border border-border rounded-md shadow-sm focus:outline-none focus:ring-ring focus:border-ring bg-background"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-secondary px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="submit"
                        class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-primary text-base font-medium text-primary-foreground hover:bg-primary/90 sm:ml-3 sm:w-auto sm:text-sm">Create Rule</button>
                    <button type="button" onclick="hideRuleModal()"
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-border shadow-sm px-4 py-2 bg-background text-base font-medium text-foreground hover:bg-muted sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function clearRulesFilters() {
        document.getElementById('container').value = '';
        document.getElementById('destination').value = '';
        document.getElementById('include_expired').checked = false;
        updateRulesClearButton();
        document.getElementById('rules-filter-form').dispatchEvent(new Event('change', { bubbles: true }));
    }
    function updateRulesClearButton() {
        var hasFilters = document.getElementById('container').value !== '' ||
                         document.getElementById('destination').value !== '' ||
                         document.getElementById('include_expired').checked;
        document.getElementById('clear-filters-btn').classList.toggle('hidden', !hasFilters);
    }
    document.getElementById('rules-filter-form').addEventListener('change', updateRulesClearButton);
    document.getElementById('rules-filter-form').addEventListener('input', updateRulesClearButton);
    updateRulesClearButton();

    function showCreateRuleModal() {
        document.getElementById('rule-modal').classList.remove('hidden');
        document.getElementById('modal-title').textContent = 'Create New Rule';
        document.getElementById('rule-form').reset();
        document.getElementById('action').value = 'allow';
        document.getElementById('rule-form').setAttribute('hx-post', '{{.Prefix}}/htmx/rules');
    }
    function hideRuleModal() { document.getElementById('rule-modal').classList.add('hidden'); }
    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id === 'rules-list') { hideRuleModal(); }
    });
</script>
{{end}}
